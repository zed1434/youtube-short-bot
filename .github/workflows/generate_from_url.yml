name: Generate Short From Example URL (Draft)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL to copy style from (transcript only)"
        required: true
      niche:
        description: "What niche/topic the new short should be about"
        required: true
      lang:
        description: "Transcript language (en, el, etc.)"
        required: false
        default: "en"
      tags:
        description: "Clip tags to use from assets/clips/clips.json (comma-separated)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + ffmpeg
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate draft short
        run: |
          python src/make_short_from_clips.py --url "${{ inputs.url }}" --niche "${{ inputs.niche }}" --lang "${{ inputs.lang }}" --tags "${{ inputs.tags }}"

      - name: Commit output draft
        run: |
          git config user.name "short-bot"
          git config user.email "short-bot@users.noreply.github.com"
          git add out/latest.mp4 out/latest.json
          git commit -m "Draft short from URL" || echo "No changes"
          git push
